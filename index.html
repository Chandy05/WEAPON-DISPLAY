<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCORE DISPLAY</title>
    <style>
        /* รีเซ็ตค่าขอบเขตทั้งหมดให้พอดีเป๊ะ 100% */
        *, *:before, *:after { box-sizing: border-box; }
        html, body { 
            background-color: #e9ecef; margin: 0; padding: 0; 
            font-family: 'Tahoma', sans-serif; 
            height: 100%; width: 100%; 
            overflow: hidden; /* ล็อกหน้าจอห้ามมีแถบเลื่อน */
        }

        /* ตารางหลักขึงตึง 100% */
        table { 
            width: 100%; height: 100%; 
            border-collapse: collapse; background: white; 
            table-layout: fixed; border: 3px solid #343a40; 
        }

        /* หัวตาราง (คงที่ 8% ของความสูงจอ) */
        thead { height: 8vh; }
        th { 
            background-color: #343a40; color: white; 
            font-size: 2.8vh; font-weight: bold; 
            border: 1px solid #555; text-transform: uppercase; 
        }

        /* ส่วนเนื้อหาแบ่งตามจำนวนนักบิน (92% ที่เหลือ) */
        tbody { height: 92vh; }
        tr.pilot-block { height: var(--row-height, 23vh); }
        
        td { border: 1px solid #bbb; text-align: center; vertical-align: top; padding: 0; }
        tr td { border-bottom: 3px solid #343a40 !important; }

        /* คอลัมน์ลำดับเครื่อง (ปรับให้เล็กลงตามคำขอ) */
        .th-pilot { width: 6%; }
        .pilot-col { width: 6%; vertical-align: middle; background: #f8f9fa; border-right: 3px solid #343a40 !important; }
        .pilot-num { font-size: 4vh; font-weight: bold; color: #000; }

        /* การแบ่งพื้นที่ 4 แถวในแต่ละช่อง */
        .score-cell { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .bomb-row { 
            flex: 1; min-height: 0; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 4vh; font-weight: bold; color: #000; 
            border-bottom: 1px solid #ddd; width: 100%; 
        }
        .bomb-row:last-child { border-bottom: none; }

        /* จัดการสีของเครื่องหมาย + ให้เป็นสีแดง/ชมพู */
        .plus-sign { color: #ff1744; margin-left: 2px; }

        /* คอลัมน์ STRF รวม */
        .th-strf-total { width: 10%; background-color: #2c3e50; }
        .total-col { background: #fff3cd; color: #856404; font-weight: bold; font-size: 6vh; vertical-align: middle; }

        /* สถานะพิเศษ */
        .latest-hl { background-color: #d4edda !important; }
        .target-cursor { background-color: #fffde7 !important; box-shadow: inset 0 0 0 3px #d32f2f !important; }
        .status-dot { position: fixed; bottom: 5px; left: 5px; width: 8px; height: 8px; background: #00e676; border-radius: 50%; opacity: 0.4; }
    </style>
</head>
<body>

    <table id="displayTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
    
    <div class="status-dot"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpYbd6xbz8eDVv-PCrqMnXnNwzEkaa75g",
            authDomain: "chdy-score.firebaseapp.com",
            databaseURL: "https://chdy-score-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chdy-score",
            storageBucket: "chdy-score.firebasestorage.app",
            messagingSenderId: "183108640986",
            appId: "1:183108640986:web:dc03c29b51875ee7cd05e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const displayRef = ref(db, 'liveDisplay');

        onValue(displayRef, (snapshot) => {
            const data = snapshot.val();
            if (data) renderBoard(data);
        });

        // ฟังก์ชันช่วยจัดการสีและเครื่องหมาย +
        function formatScore(val) {
            if (!val) return "";
            let color = "#000"; // สีดำปกติสำหรับตัวเลข, D, OUT
            
            if (val === "N/S") color = "#d32f2f"; // แดงสำหรับ N/S
            else if (val === "HIT") color = "#28a745"; // เขียวสำหรับ HIT
            
            // ถ้ามีเครื่องหมาย + ให้แยกออกมาใส่สีแดง/ชมพู
            let displayText = val;
            if (val.includes("+")) {
                displayText = val.replace("+", '<span class="plus-sign">+</span>');
            }
            
            return `<span style="color: ${color}">${displayText}</span>`;
        }

        function renderBoard(data) {
            let columns = data.columns || [];
            let pilots = data.pilots || [];
            let thead = document.getElementById('tableHead');
            let tbody = document.getElementById('tableBody');
            
            if (pilots.length === 0 || columns.length === 0) return;

            // คำนวณความสูงแถวให้พอดีเป๊ะ (92% / จำนวนนักบิน)
            let rowH = (92 / pilots.length) + "vh";
            document.documentElement.style.setProperty('--row-height', rowH);

            let hasSTRF = columns.some(col => col.name.toUpperCase().startsWith("STRF"));

            thead.innerHTML = `<tr><th class="th-pilot">#</th>` + 
                columns.map(c => `<th>${c.name}</th>`).join('') + 
                (hasSTRF ? `<th class="th-strf-total">รวม STRF</th>` : "") + `</tr>`;

            tbody.innerHTML = pilots.map(p => {
                let strfTotal = 0;
                let colsHTML = columns.map(col => {
                    let passes = (p.cols || {})[col.id] || [];
                    let rows = "";
                    for(let i=0; i<4; i++) {
                        let cell = passes[i] || { val: "", isLatest: false, isTarget: false };
                        let cleanVal = cell.val.trim();
                        
                        if (col.name.toUpperCase().startsWith("STRF")) {
                            let n = parseInt(cleanVal); if(!isNaN(n)) strfTotal += n;
                        }

                        let cls = (cell.isTarget ? " target-cursor" : "") + (cell.isLatest ? " latest-hl" : "");
                        rows += `<div class="bomb-row${cls}">${formatScore(cleanVal)}</div>`;
                    }
                    return `<td><div class="score-cell">${rows}</div></td>`;
                }).join('');

                return `<tr class="pilot-block">
                    <td class="pilot-col"><div class="pilot-num">${p.num || '#'+p.pId}</div></td>
                    ${colsHTML}
                    ${hasSTRF ? `<td class="total-col">${strfTotal}</td>` : ""}
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
